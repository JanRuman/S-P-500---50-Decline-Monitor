name: Daily S&P 500 Decline Report

on:
  schedule:
    - cron: '0 6 * * *'   # 6:00 AM UTC daily (roughly after previous day's US market close)
  workflow_dispatch:        # Allow manual trigger from GitHub Actions UI

permissions:
  contents: write           # Required to commit and push docs/index.html

jobs:
  update-report:
    runs-on: ubuntu-latest
    timeout-minutes: 120    # Hard cap — well within the 6-hour Actions limit

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Restore ticker/price cache
        uses: actions/cache@v4
        with:
          path: cache/
          key: stock-cache-${{ runner.os }}-${{ hashFiles('src/fetch_prices.py') }}
          restore-keys: |
            stock-cache-${{ runner.os }}-

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate report
        run: python -m src.main

      - name: Save ticker/price cache
        uses: actions/cache@v4
        if: always()   # Save even if a batch partially failed
        with:
          path: cache/
          key: stock-cache-${{ runner.os }}-${{ hashFiles('src/fetch_prices.py') }}

      - name: Commit and push updated report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/index.html docs/.nojekyll
          git diff --staged --quiet || git commit -m "chore: update report $(date -u +'%Y-%m-%d')"
          git push

